<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .dashboard-buttons a {
            display: inline-block;
            margin: 5px;
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 3px;
        }
        .dashboard-buttons a:hover { background-color: #0056b3; }
        .summary-section { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .summary-section h2 { margin-top: 0; }
    </style>
</head>
<body>
    <h1> Online Medical Store</h1>

    <div class="dashboard-buttons">
        <a href="{% url 'orders:dashboard' %}">Dashboard</a>
        <a href="{% url 'products:add_medicine' %}">Add Medicine</a>
        <a href="{% url 'products:medicine_list' %}">View Medicines</a>
        <a href="{% url 'orders:add_order' %}">Add Order</a>
        <a href="{% url 'orders:order_list' %}">View Orders</a>
        <a href="{% url 'customers:customer_list' %}">View Customers</a>
        <a href="{% url 'customers:add_customer' %}">Add Customer</a>
        <a href="{% url 'orders:profit_report' %}">View Profit Report</a>
        <a href="{% url 'products:stock_list' %}">View Stock</a>
        <a href="{% url 'products:add_stock' %}">Add Stock</a>
    </div>
    <div class="content-wrapper">
        {% block content %}
        <!-- Page-specific content goes here -->
        {% endblock %}
    </div>
</body>
</html>
