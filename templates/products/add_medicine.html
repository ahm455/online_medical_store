<!DOCTYPE html>
<html>
<head>
    <title>Add Medicine</title>
</head>
<body>
    <h1>Add Medicine</h1>

    <form method="POST">
        {% csrf_token %}

        <label for="medicine_name">Medicine Name:</label><br>
        <input type="text" name="medicine_name" id="medicine_name" required><br><br>

        <label for="potency">Potency:</label><br>
        <input type="text" name="potency" id="potency" required><br><br>

        <label for="cost_price">Cost Price:</label><br>
        <input type="number" step="0.01" name="cost_price" id="cost_price" required><br><br>

        <label for="selling_price">Selling Price:</label><br>
        <input type="number" step="0.01" name="selling_price" id="selling_price" required><br><br>

        <label for="expiry_date">Expiry Date:</label><br>
        <input type="date" name="expiry_date" id="expiry_date"><br><br>

        <button type="submit">Save</button>
    </form>

    <a href="{% url 'products:medicine_list' %}">Back to Medicine List</a>
</body>
</html>
