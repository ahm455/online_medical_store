<!DOCTYPE html>
<html>
<head>
    <title>Stock List</title>
</head>
<body>
    <h1>Stock List</h1>

    <a href="{% url 'products:add_stock' %}">Add Stock</a>
    <table border="1">
        <tr>
            <th>Medicine</th>
            <th>Quantity</th>
        </tr>
        {% for stock in stocks %}
        <tr>
            <td>{{ stock.medicine.medicine_name }}</td>
            <td>{{ stock.quantity }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
