{% extends 'base.html' %}

{% block content %}
<h2>Daily Profit Summary</h2>

<table border="1" cellpadding="5">
    <tr>
        <th>Date</th>
        <th>Total Profit</th>
    </tr>

    {% for item in profits %}
    <tr>
        <td>{{ item.date }}</td>
        <td>{{ item.total_profit|default:"0" }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="2">No orders yet</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
